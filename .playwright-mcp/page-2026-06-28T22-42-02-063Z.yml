            - heading "HAS SERİSİ Sıcak Hava Kazanları" [level=2] [ref=e56]
            - paragraph [ref=e57]: Enorpa Has serisi sıcak hava kazanı tasarımları yapılırken; optimum ısıl konstrüksiyon ve çevreye en az zarar veren karbonmonoksit salınımları göz önünde bulundurularak yapılır.
            - paragraph [ref=e58]: İlgili hava debisi değerlerine göre yapılması gereken mukavemet ve aerodinamik hesapları neticesinde tamamıyla ısıtılmış ve homojen bir sıcak hava dağılımı sağlanır.
            - paragraph [ref=e59]: Enorpa Has serisi sıcak hava kazanları hızlı sıcak hava üreticisidir. Özel bir prosese uygun şekilde farklı konstrüksiyonlarla uygunlanabilir. Yüksek sıcaklıkta sıcak hava kazanının içerisinden geçerken karşılaşmış olduğu toz, duman, kurum gibi düşük etkeni indirgeyerek taşınmasını sağlar.
            - paragraph [ref=e60]: Sistemin alev ve dumanına maruz kalan tüm parçaları S235JR EN 10028-2 sertifikalı yüksek sıcaklığa dayanıklı saçlar kullanılır. Isıl geçişlerinin sağlandığı kaset yapısı yüksek bir ısı transfer yüzeyi oluşturur. Geniş duman akış kanalları ve kaynak çapazlı bulunmayan kesitleri sayesinde ısıtma kesintisiz kurum tutup tıkanma ihtimali minimize edilmiştir.
            - paragraph [ref=e61]: Geniş bir kullanım alanı olan sıcak havanın en az maliyet ve en kaliteli şekilde üretilebilmesi için; çift emişli hücre tipi fanlar ile tahrik edilmiştir.
            - paragraph [ref=e62]: Has serisi sıcak hava kazanı üzerindeki tüm kaynakların süreç yönetimi EN ISO 15614-1:2012 standardına tabi şekilde yürütülür ve bütün kaynaklar TS EN ISO 9606-1:2014 standardına tabi test edilen kaynakçılar tarafından yapılır.
            - paragraph [ref=e63]: Kaynak malzemelerinin ana malzemeye uyumu, kaynak pozisyonları ve her türlü kaynak çeşidi standartlara Enorpa’ya özel olarak sabitlenmiş WPS ve PQR’lara uygun şekildedir.
